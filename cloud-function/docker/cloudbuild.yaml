steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/strategy-optimizer-api', '.']
    timeout: 600s
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/strategy-optimizer-api']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'strategy-optimizer-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/strategy-optimizer-api'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '3'
      - '--set-env-vars'
      - 'PYTHONUNBUFFERED=1,N_JOBS=4'

images:
  - 'gcr.io/$PROJECT_ID/strategy-optimizer-api'

timeout: 1200s
