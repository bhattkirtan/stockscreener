# Rate limiting zones (defined outside server block)
# Login: max 5 req/min per IP — prevents brute force
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
# General API: max 10 req/sec per IP (single-user dashboard)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver and re-resolve every 10 s so nginx
    # picks up new container IPs after restarts without needing a reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # React static files
    root /usr/share/nginx/html;
    index index.html;

    # Strict rate limit on login — 5 req/min, no burst
    location /api/auth/login {
        limit_req zone=login burst=2 nodelay;
        limit_req_status 429;

        set $api_upstream http://api:8000;
        proxy_pass         $api_upstream/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
    }

    # Proxy /api/* → FastAPI (strip /api prefix)
    # Must use a variable so nginx re-resolves the hostname on each request.
    # rewrite strips /api/ prefix before proxy_pass sees the URI.
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        limit_req_status 429;

        set $api_upstream http://api:8000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # React SPA — serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
