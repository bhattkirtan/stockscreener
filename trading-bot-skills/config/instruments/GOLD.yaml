# GOLD (XAU/USD) instrument-specific overrides
# Deep-merged over trading_config.yaml at runtime
#
# Strategy (optimised on 2y M5 data, 2024-02-26 → 2026-04-09):
#   Entry:  M5 Supertrend(14×1.5) flip
#   Filter: MA100 bias (price > MA100 → BUY only; price < MA100 → SELL only)
#           MA100 slope (20-bar lookback — MA must be pointing in signal direction)
#   Exit:   SL or TP only — no reverse-signal exit; OR Supertrend tick cross (live)
#   R:R:    1:3  (SL=15, TP=45)  → breakeven at 25% WR
#   Backtest optimum: SL=20, TP=120 → +$11,901 (+119%) over 2 years, 272 trades
#
# Capital.com specs:
#   pip_size = 1.0  →  stop_loss_pips = 15 means $15 price distance per contract
#   SL risk  = 15 × 10 = $150 per trade  (1.5% of $10k)
#   TP reward = 45 × 10 = $450 per trade  (or earlier on ST tick exit)

bot:
  name: "GOLD M5 SupertrendVWAP Bot"

market_data:
  instrument: GOLD
  timeframe: M5
  resample_to: M5

backtest:
  data_path: "../cloud-function/data/GOLD_M5_215000bars.csv"
  report_prefix: "GOLD"
  leverage: 20                  # Capital.com GOLD leverage

backtesting:
  position_size: 10             # 10 oz contracts per trade
  spread_cost_usd: 0.50         # $0.50/contract → $5.00 total  (observed spread)
  slippage_cost_usd: 0.10       # $0.10/contract → $1.00 total  (realistic market-order slip)
  dynamic_sizing:
    enabled: true
    method: steps               # fixed ladder — +2 oz per $1k accumulated profit
    scale_every_usd: 1000       # add a step every $1,000 profit: $1k→12oz, $2k→14oz, $5k→20oz
    size_increment: 0.1         # +0.2 oz per step
    max_size: 50                # cap at 50 oz (~$1,000 SL risk at $20 SL)
    size_per_capital: 1000      # unused in steps mode

analysis:
  indicators:
    supertrend:
      atr_period: 14               # optimised: ATR14 x 1.5 best Sharpe/return/drawdown
      multiplier: 1.5
    ema:
      period: 21
    sma:
      fast_period: 25
      slow_period: 30
      bias_period: 100             # MA100 directional bias filter
      bias_enabled: true
      bias_slope_bars: 20          # MA100 must also be pointing in signal direction (20 bars = 100 min)
    adx:
      enabled: false               # not used — MA100 slope handles trend quality
    m1_exit:
      enabled: false               # not used — SL/TP exits only
    mtf:
      h1_bb_period: 20
      h1_bb_std: 2.0
      h4_bb_period: 20
      h4_bb_std: 2.0
      daily_bb_period: 20
      daily_bb_std: 2.0
      daily_sma_period: 20
  signal_rules:
    require_ema: false            # EMA redundant with Supertrend — disabled after testing
    require_sma: false            # SMA(25/30) cuts good trades — disabled after testing
    require_adx: false            # ADX disabled — MA100 bias filter in use
    require_sma_bias: true        # MA100 directional bias: above = BUY only, below = SELL only
    require_h1_bb: false
    require_mtf_bb: false
    mtf_min_votes: 2
  sl_tp:
    method: fixed               # pip_size / stop_loss_pips / take_profit_pips come from risk:

  tick_exit:
    enabled: true
    # Reverse-on-loss DISABLED: was stacking losses by closing and re-entering on every
    # ST trail tick cross while in a loss (every 3 min) — confirmed Apr 7-10: 18 live
    # trades vs 10 backtest. Tick exit is kept ON for profit-trailing only (locks in
    # gains when trend reverses before TP).
    reverse_on_loss: false
    loss_check_interval_sec: 180   # unused when reverse_on_loss=false
    # Profit-based check interval — shrinks as unrealised profit grows.
    # check_interval_sec: 0 means check every tick.
    levels:
      - min_profit_pips: 0     # small/no profit → check every 3 min
        check_interval_sec: 180
      - min_profit_pips: 10    # 10 pip profit → check every 2 min
        check_interval_sec: 120
      - min_profit_pips: 20    # 20 pip profit → check every 1 min
        check_interval_sec: 60
      - min_profit_pips: 25    # 25 pip profit → every tick (lock in gains)
        check_interval_sec: 0

risk:
  pip_size: 1.0                 # 1 pip = $1.00 price move  (commodity trading convention)
  stop_loss_pips: 15            # 15 pips × $1.00 = $15.00 SL distance per contract
  take_profit_pips: 45          # 45 pips × $1.00 = $45.00 TP distance (1:3 R:R)
  reverse_signal_exit: false    # do NOT close on reverse signal — only SL/TP/tick exits

m1_validation:
  data_path: "../cloud-function/data/GOLD_M1_20240101_20251231.csv"
  tz_offset_hours: -1           # Kaggle XAU data is GMT+1 → shift to UTC

execution:
  instrument: GOLD
  epic: GOLD
  environment: demo
