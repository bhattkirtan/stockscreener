# SILVER (XAG/USD) instrument-specific overrides
# Deep-merged over trading_config.yaml at runtime
#
# Capital.com specs:
#   Price: ~$30–35/oz  |  Tick size: $0.01  |  Spread: ~$0.10/oz
#   Trading pip convention: 1 pip = $1.00 price move  (same as GOLD/indices)
#   pip_size = 1.0  →  stop_loss_pips = 1 means $1.00 price distance
#
# Risk per trade (200 oz, SL=1 pip):
#   SL risk   = 1 × 1.0 × 200 = $200  (2.0% of $10k)
#   TP reward = 3 × 1.0 × 200 = $600  (1:3 R:R)
#   Spread cost = $0.10 × 200 = $20.00  (10% of SL risk — verify live spread)

bot:
  name: "SILVER M5 SupertrendVWAP Bot"

market_data:
  instrument: SILVER
  timeframe: M5
  resample_to: M5

backtest:
  data_path: "../cloud-function/data/SILVER_M5_215000bars.csv"
  report_prefix: "SILVER"
  leverage: 10                  # Capital.com SILVER leverage

backtesting:
  position_size: 200             # 200 oz per trade
  spread_cost_usd: 0.10          # $0.10/oz → $20.00 total  (verify against live platform)
  slippage_cost_usd: 0.01        # $0.01/oz → $2.00 total  (market-order slip)

analysis:
  indicators:
    supertrend:
      atr_period: 7
      multiplier: 2.0
    ema:
      period: 21
    sma:
      fast_period: 25
      slow_period: 30
    mtf:
      h1_bb_period: 20
      h1_bb_std: 2.0
      daily_sma_period: 20
  signal_rules:
    require_h1_bb: true
  sl_tp:
    method: fixed               # pip_size / stop_loss_pips / take_profit_pips come from risk:

risk:
  pip_size: 1.0                 # 1 pip = $1.00 price move  (same convention as GOLD)
  stop_loss_pips: 1             # 1 pip × $1.00 = $1.00 SL distance per oz
  take_profit_pips: 3           # 3 pips × $1.00 = $3.00 TP distance  (1:3 R:R)
  reverse_signal_exit: false    # SL/TP exits only

execution:
  instrument: SILVER
  epic: SILVER
  environment: demo
