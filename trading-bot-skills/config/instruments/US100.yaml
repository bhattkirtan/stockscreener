# US100 (NASDAQ 100) instrument-specific overrides
# Deep-merged over trading_config.yaml at runtime

bot:
  name: "US100 M5 SupertrendVWAP Bot"

market_data:
  instrument: US100
  timeframe: M5
  resample_to: M5

backtest:
  data_path: "../cloud-function/data/US100_M5_150000bars.csv"
  report_prefix: "US100"
  position_size: 1            # 1 unit per trade
  leverage: 20                # Capital.com leverage (informational — used for margin display)

analysis:
  indicators:
    supertrend:
      atr_period: 10
      multiplier: 3.0        # US100 is more volatile — wider ST
    ema:
      period: 21
    sma:
      fast_period: 25
      slow_period: 50
    mtf:
      h1_bb_period: 20
      h1_bb_std: 2.0
      daily_sma_period: 20
  signal_rules:
    require_h1_bb: false      # Disable until US100 MTF tuned
  sl_tp:
    method: fixed
    stop_loss_pips: 25        # SL = 25 pts
    take_profit_pips: 100     # TP = 100 pts (1:4 R:R)

risk:
  trading_hours:
    enabled: true             # US100: trade US session only
    start_hour: 13            # 13:30 UTC = NYSE open
    end_hour: 21              # 21:00 UTC = NYSE close
    friday_close_hour: 20

execution:
  instrument: US100
