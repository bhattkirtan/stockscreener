# EURUSD instrument-specific overrides
# Deep-merged over trading_config.yaml at runtime
# Note: Only M15 data available (EURUSD_M15_10000bars.csv)

bot:
  name: "EURUSD M15 SupertrendVWAP Bot"

market_data:
  instrument: EURUSD
  timeframe: M15
  resample_to: M15

backtest:
  data_path: "../cloud-function/data/EURUSD_M15_10000bars.csv"
  report_prefix: "EURUSD"

analysis:
  indicators:
    supertrend:
      atr_period: 7
      multiplier: 2.0
    ema:
      period: 21
    sma:
      fast_period: 25
      slow_period: 30
    mtf:
      h1_bb_period: 20
      h1_bb_std: 2.0
      daily_sma_period: 20
  signal_rules:
    require_h1_bb: true
  sl_tp:
    method: fixed
    stop_loss_pips: 15        # EURUSD tight spread ~0.5 pips
    take_profit_pips: 45      # 1:3 R:R

risk:
  trading_hours:
    enabled: true             # EURUSD: London + NY overlap
    start_hour: 7             # 07:00 UTC = London open
    end_hour: 21              # 21:00 UTC = NY close
    friday_close_hour: 20

execution:
  instrument: EURUSD
