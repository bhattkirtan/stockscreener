# ETHUSD (ETH/USD) instrument-specific overrides
# Deep-merged over trading_config.yaml at runtime
#
# Capital.com specs (demo account):
#   Price: ~$1,800–3,500  |  Epic: ETHUSD  |  Spread: ~$1.75/contract
#   Trading pip convention: 1 pip = $1.00 price move
#   pip_size = 1.0  →  stop_loss_pips = 50 means $50 price distance
#
# Risk per trade (2 ETH, SL=50 pips):
#   SL risk   = 50 × 1.0 × 2 = $100  (1.0% of $10k)
#   TP reward = 150 × 1.0 × 2 = $300  (1:3 R:R)
#   Spread cost = $1.75 × 2 = $3.50  (3.5% of SL risk)

bot:
  name: "ETHUSD M5 SupertrendVWAP Bot"

market_data:
  instrument: ETHUSD
  timeframe: M5
  resample_to: M5

backtest:
  data_path: "../cloud-function/data/ETHUSD_M5_215000bars.csv"
  report_prefix: "ETHUSD"
  leverage: 1                   # No leverage — full notional exposure

backtesting:
  initial_capital: 10000.0          # Start with $20k for ETHUSD (higher volatility than GOLD/EURUSD)
  position_size: 2              # 1 ETH per trade
  spread_cost_usd: 1.75         # $1.75/contract → $3.50 total  (live screenshot: $2059.14/$2060.89)
  slippage_cost_usd: 0.50       # $0.50/contract → $1.00 total  (crypto slippage)
  dynamic_sizing:
    enabled: true
    method: steps               # 'steps' (fixed ladder) or 'percent' (proportional to capital)
    size_per_capital: 1000      # percent mode: 1 ETH per $10,000 of capital
                                 # $20k → 2 ETH, $40k → 4 ETH, $100k → 10 ETH (cap)
    scale_every_usd: 1000        # steps mode (unused when method=percent): +0.2 ETH per $1k profit
    size_increment: 0.1         # steps mode: +0.1 ETH per step
    max_size: 10                 # Cap at 10 ETH (~$500 SL risk)

analysis:
  indicators:
    supertrend:
      atr_period: 14              # optimised: ATR14 x 1.5 best Sharpe/return/drawdown
      multiplier: 1.5             # tighter band = earlier entries, lower drawdown
    ema:
      period: 21
    sma:
      fast_period: 25
      slow_period: 30
    mtf:
      h1_bb_period: 20
      h1_bb_std: 2.0
      h4_bb_period: 20
      h4_bb_std: 2.0
      daily_bb_period: 20
      daily_bb_std: 2.0
      daily_sma_period: 20
  signal_rules:
    require_h1_bb: false
    require_mtf_bb: false
    mtf_min_votes: 2
  sl_tp:
    method: fixed               # pip_size / stop_loss_pips / take_profit_pips come from risk:

risk:
  pip_size: 1.0                 # 1 pip = $1.00 price move
  stop_loss_pips: 45            # 45 pips × $1.00 = $45 SL distance per ETH
  take_profit_pips: 170         # 170 pips × $1.00 = $170 TP distance  (1:3.8 R:R)

execution:
  instrument: ETHUSD
