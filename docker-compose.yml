# Stock Screener — Docker Compose
#
# Services:
#   api           — FastAPI: Capital.com proxy + bot monitoring  → :8000 (internal)
#   nginx         — React UI + /api reverse proxy               → :80
#   data-updater  — Fetches calendar/news/macro → writes JSON to /data volume
#   react-builder — One-off: build React into react_dist volume (profile=build)
#
# Quick start:
#   cp .env.example .env && nano .env
#   docker compose --profile build run --rm react-builder
#   docker compose up -d

services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./cloud-function/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - RESULTS_DIR=/data/results
      - UPDATER_URL=http://data-updater:8001
      - BACKTEST_URL=http://backtest-runner:8010
      - BOT_CONTROL_URL=http://trading-bot:8020
    volumes:
      - trading_data:/data
      - ./secrets:/secrets:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backtest runner (frontend-triggered optimize jobs) ────────────────────
  backtest-runner:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - RESULTS_DIR=/data/results
      - DB_PATH=/data/trading.db
    command: uvicorn backtest_api:app --host 0.0.0.0 --port 8010
    volumes:
      - trading_data:/data
      - ./cloud-function/data:/cloud-function/data
    networks:
      - internal

  # ── Bar updater (incremental candle sync, runs every 15 min) ────────────────
  bar-updater:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/data/trading.db
    command: python bar_updater.py --interval 900
    volumes:
      - trading_data:/data
    networks:
      - internal

  # ── Trading bot (live/demo process manager + scheduler) ──────────────────────
  trading-bot:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
      - DB_PATH=/data/trading.db
      - RESULTS_DIR=/data/results
    command: uvicorn bot_control_api:app --host 0.0.0.0 --port 8020
    volumes:
      - trading_data:/data
      - ./secrets:/secrets:ro
    networks:
      - internal

  # ── React UI (nginx) ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./cloud-function/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - react_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── Data updater (calendar / news / macro) ─────────────────────────────────
  data-updater:
    build:
      context: ./cloud-function
      dockerfile: Dockerfile.updater
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
    volumes:
      - trading_data:/data
    networks:
      - internal

  # ── One-off: build React ────────────────────────────────────────────────────
  react-builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./capital-connect:/app
      - react_dist:/app/dist
    environment:
      - VITE_BOT_API_URL=/api
      - VITE_CAPITAL_API_URL=/api
      - VITE_OPTIMIZER_API_URL=/api
      - VITE_SCHEDULER_API_URL=/api
      - VITE_CAPITAL_API_URL_LIVE=/api
    command: sh -c "npm ci && npm run build"
    profiles: ["build"]

volumes:
  trading_data:   # SQLite DB + logs
  react_dist:     # compiled React app

networks:
  internal:
    driver: bridge
