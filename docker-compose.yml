# Trading Bot — Docker Compose for Hetzner VM
#
# Services:
#   api              — FastAPI: bot monitoring + Capital.com proxy + backtest API  → :8000 (internal)
#   nginx            — React UI + /api reverse proxy                               → :80
#   bot              — Live trading bot (demo/live mode)                           → internal
#   backtest-viewer  — Dash trade viewer UI                                        → :8050
#   react-builder    — One-off: build React into react_dist volume    (profile=build)
#   backtest-runner  — One-off: run a backtest and save results       (profile=backtest)
#
# Quick start:
#   cp .env.vm.example .env.vm && nano .env.vm
#   docker compose --env-file .env.vm --profile build run --rm react-builder
#   docker compose --env-file .env.vm up -d
#
# Run a backtest on demand:
#   docker compose --env-file .env.vm --profile backtest run --rm backtest-runner \
#       --instrument GOLD --tag my_run

services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./cloud-function/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.vm
    environment:
      - RESULTS_DIR=/data/results
    volumes:
      - trading_data:/data            # SQLite DB, logs, and backtest results
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React UI (nginx) ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./cloud-function/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - react_dist:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  # ── Live trading bot ────────────────────────────────────────────────────────
  bot:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.vm
    environment:
      - DB_PATH=/data/trading.db
    volumes:
      - trading_data:/data
      - price_data:/data/price_data:ro   # large CSV files (upload separately)
    networks:
      - internal
    command: >
      python orchestrator/main.py --mode demo
    depends_on:
      api:
        condition: service_healthy

  # ── Dash trade viewer ───────────────────────────────────────────────────────
  backtest-viewer:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8050:8050"
    volumes:
      - trading_data:/data
      - price_data:/data/price_data:ro
    networks:
      - internal
    command: >
      python view_trades.py
        --host 0.0.0.0
        --port 8050
        --results-dir /data/results

  # ── One-off: build React ────────────────────────────────────────────────────
  react-builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./capital-connect:/app
      - react_dist:/app/dist
    environment:
      - VITE_BOT_API_URL=/api
      - VITE_CAPITAL_API_URL=/api
    command: sh -c "npm ci && npm run build"
    profiles: ["build"]

  # ── One-off: run a backtest ─────────────────────────────────────────────────
  backtest-runner:
    build:
      context: ./trading-bot-skills
      dockerfile: Dockerfile
    volumes:
      - trading_data:/data
      - price_data:/data/price_data:ro
    environment:
      - RESULTS_DIR=/data/results
    # Usage:
    #   docker compose --env-file .env.vm --profile backtest run --rm backtest-runner \
    #       --instrument GOLD --tag my_experiment
    entrypoint: ["python", "run_skills_backtest.py", "--results-dir", "/data/results"]
    profiles: ["backtest"]

volumes:
  trading_data:       # SQLite DB + logs + backtest results
  react_dist:         # compiled React app
  price_data:         # price CSVs (upload manually: GOLD_M5_215000bars.csv, etc.)

networks:
  internal:
    driver: bridge
